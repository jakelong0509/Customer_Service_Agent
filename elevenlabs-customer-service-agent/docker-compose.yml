# Local development
services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    # volumes:
    #   - .:/main
    # working_dir: /main
    depends_on:
      db:
        condition: service_healthy

  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 
      POSTGRES_DB: 
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5