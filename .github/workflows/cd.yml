# Build with Docker Compose (Postgres + Redis + app) and run pytest in the app container.
name: Build and Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual triggering

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push app image
        working-directory: elevenlabs-customer-service-agent
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t customer-service-agent .
          docker tag customer-service-agent:latest $ECR_REGISTRY/customer-service-agent:${{ github.sha }}
          docker tag customer-service-agent:latest $ECR_REGISTRY/customer-service-agent:latest
          docker push $ECR_REGISTRY/customer-service-agent:${{ github.sha }}
          docker push $ECR_REGISTRY/customer-service-agent:latest

      - name: Build and push worker image
        working-directory: elevenlabs-customer-service-agent
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f Dockerfile.worker -t customer-service-worker .
          docker tag customer-service-worker:latest $ECR_REGISTRY/customer-service-worker:${{ github.sha }}
          docker tag customer-service-worker:latest $ECR_REGISTRY/customer-service-worker:latest
          docker push $ECR_REGISTRY/customer-service-worker:${{ github.sha }}
          docker push $ECR_REGISTRY/customer-service-worker:latest

