# Build the app image and run pytest inside it (same environment as production).
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  test-docker:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: elevenlabs-customer-service-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          echo "POSTGRES_CONNECTION_STRING=${{ secrets.POSTGRES_CONNECTION_STRING }}" > .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "MILVUS_CLUSTER_ENDPOINT=${{ secrets.MILVUS_CLUSTER_ENDPOINT }}" >> .env
          echo "MILVUS_COLLECTION_TOKEN=${{ secrets.MILVUS_COLLECTION_TOKEN }}" >> .env
          echo "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" >> .env
          echo "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" >> .env
          echo "TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}" >> .env
          echo "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" >> .env
          echo "SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL }}" >> .env
          echo "LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}" >> .env
          echo "LANGSMITH_PROJECT=${{ secrets.LANGSMITH_PROJECT }}" >> .env
          echo "LANGSMITH_TRACING=${{ secrets.LANGSMITH_TRACING }}" >> .env
          echo "LANGSMITH_ENDPOINT=${{ secrets.LANGSMITH_ENDPOINT }}" >> .env

      # Matches Dockerfile: EXPOSE 8000 + CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
      - name: Build Docker image
        run: docker build -t customer-service-agent:ci .

      # Override CMD: Dockerfile defaults to uvicorn :8000; tests run pytest instead.
      - name: Run tests in container
        run: |
          docker run --rm --env-file .env customer-service-agent:ci \
            python -m pytest tests/ -q

      # Optional: same as Dockerfile CMD — uvicorn app.main:app --host 0.0.0.0 --port 8000
      # EXPOSE 8000 → publish with -p 8000:8000. Enable when the app can start without extra services.
      # - name: Smoke test default CMD
      #   run: |
      #     docker run -d --name ci-app --env-file .env -p 8000:8000 customer-service-agent:ci
      #     curl -sf --retry 15 --retry-delay 2 http://127.0.0.1:8000/
      #     docker rm -f ci-app
