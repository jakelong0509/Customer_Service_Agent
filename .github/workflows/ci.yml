# Build the app image and run pytest inside it (same environment as production).
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  test-docker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elevenlabs-customer-service-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          echo "POSTGRES_CONNECTION_STRING=${{ secrets.POSTGRES_CONNECTION_STRING }}" > .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

      - name: Start services and run tests
        run: |
          # Build and run tests in one command
          docker compose run --rm app pytest -q tests/

      - name: Cleanup
        if: always()
        run: docker compose down
